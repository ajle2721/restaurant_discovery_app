<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>小手找食 - 台北親子餐廳搜尋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="home-view" class="view active">
        <header>
            <h1>小手找食</h1>
            <p class="subtitle">幫你整理評論重點，快速找到適合帶小孩的餐廳</p>
            <div class="trust-line">已整理 400+ 間台北餐廳</div>
            <div class="location-selector" id="open-location-modal">
                <span>📍</span>
                <span id="location-text">台北市 · 全區</span>
                <span style="margin-left: auto;">▼</span>
            </div>
        </header>

        <section class="filter-section">
            <div class="helper-text">先選取你在意的條件</div>
            <div class="filters-grid">
                <div class="filter-chip" data-filter="high_chair_available">
                    <span class="filter-icon">🪑</span>
                    <span>嬰兒椅</span>
                </div>
                <div class="filter-chip" data-filter="kids_menu">
                    <span class="filter-icon">🥘</span>
                    <span>兒童餐</span>
                </div>
                <div class="filter-chip" data-filter="spacious_seating">
                    <span class="filter-icon">🛋️</span>
                    <span>寬敞座位</span>
                </div>
                <div class="filter-chip" data-filter="kid_noise_tolerant">
                    <span class="filter-icon">🥳</span>
                    <span>不怕小孩吵</span>
                </div>
            </div>
            <button id="share-results" class="btn btn-outline"
                style="margin-top: 1rem; width: 100%; border-color: var(--secondary); color: var(--secondary);">
                <span>🔗</span> 分享目前搜尋結果
            </button>
        </section>

        <div id="results-count" class="results-label"></div>

        <main id="restaurant-list" class="results-container">
            <!-- Results will be injected here -->
        </main>

        <button id="float-share" class="fab">
            <span>🔗</span>
        </button>
    </div>

    <div id="detail-view" class="view">
        <nav class="detail-header">
            <button class="back-btn" id="back-home">←</button>
            <div style="font-weight: 700; color: var(--text-muted);">餐廳詳情</div>
            <button class="back-btn" id="share-detail">📤</button>
        </nav>
        <div id="detail-content" class="detail-content">
            <!-- Detail content will be injected here -->
        </div>
    </div>

    <div id="toast" class="toast">連結已複製到剪貼簿！</div>

    <!-- Location Modal -->
    <div id="location-modal" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">選擇行政區</h3>
                <button class="modal-close" id="close-location-modal">×</button>
            </div>
            
            <button class="loc-btn active" id="loc-all">台北市 · 全區</button>
            
            <div class="loc-chips-grid">
                <div class="loc-chip" data-loc="中山區">中山區</div>
                <div class="loc-chip" data-loc="中正區">中正區</div>
                <div class="loc-chip" data-loc="信義區">信義區</div>
                <div class="loc-chip" data-loc="內湖區">內湖區</div>
                <div class="loc-chip" data-loc="北投區">北投區</div>
                <div class="loc-chip" data-loc="南港區">南港區</div>
                <div class="loc-chip" data-loc="士林區">士林區</div>
                <div class="loc-chip" data-loc="大同區">大同區</div>
                <div class="loc-chip" data-loc="大安區">大安區</div>
                <div class="loc-chip" data-loc="文山區">文山區</div>
                <div class="loc-chip" data-loc="松山區">松山區</div>
                <div class="loc-chip" data-loc="萬華區">萬華區</div>
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-primary" id="confirm-location" style="width: 100%;">確認</button>
            </div>
        </div>
    </div>

    <!-- Data and App Logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
